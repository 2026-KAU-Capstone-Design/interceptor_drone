name: 🚁 Mission Task
description: 비행 미션 수행 이슈 (M1 호버, M2 A→B, M3 사각비행, 또는 커스텀 미션)
title: "[Mission] "
labels: ["mission"]
body:
  - type: markdown
    attributes:
      value: |
        ## 미션 수행 이슈
        개별 비행 미션을 진행하기 위한 이슈입니다. 작업 전 [missions/](../missions/) 폴더의 해당 미션 README를 반드시 읽어주세요.

  - type: dropdown
    id: mission_type
    attributes:
      label: 미션 종류
      description: 어떤 미션인가요?
      options:
        - M1 — 정밀 호버 + 착륙 오차 (★)
        - M2 — A→B 포인트 이동 (★★)
        - M3 — 사각 비행 (★★★)
        - Custom — 새로 정의하는 미션
    validations:
      required: true

  - type: input
    id: assignee_name
    attributes:
      label: 수행자
      description: 미션을 수행할 팀원 이름
      placeholder: 예 성소민
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: 테스트 환경
      description: Gazebo 월드 조건 (중복 선택 시 체크박스 섹션 활용)
      multiple: true
      options:
        - baylands (무풍 0 m/s)
        - baylands_windy (보통풍 ~5.4 m/s)
        - baylands_storm (강풍 ~11.7 m/s)
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: 목표
      description: 이 미션의 구체적 목표 (미션 README와 중복돼도 OK)
      placeholder: |
        예
        - 5m 고도에서 30초 호버
        - 착륙 후 이륙 지점과의 수평 오차 측정
        - 무풍 vs 유풍 조건 비교
    validations:
      required: true

  - type: textarea
    id: success_criteria
    attributes:
      label: 성공 기준
      description: 수치적 기준. 측정 항목과 한계값
      placeholder: |
        예
        - [ ] 무풍 착륙 오차 < 0.3m
        - [ ] 유풍(5m/s) 착륙 오차 < 0.5m
        - [ ] 호버 중 수평 드리프트 std < 0.2m (무풍)
    validations:
      required: true

  - type: textarea
    id: deliverables
    attributes:
      label: 제출물 체크리스트
      placeholder: |
        - [ ] `missions/<missionN>/hover_land.py` 작성
        - [ ] rosbag 기록 (무풍 1회, 유풍 1회 이상)
        - [ ] 오차 분석 결과 (그래프 또는 표)
        - [ ] PR 제출 (dev 브랜치로)
      value: |
        - [ ] 미션 코드 작성
        - [ ] rosbag 기록 (무풍, 유풍)
        - [ ] 오차 분석 결과
        - [ ] PR 제출
    validations:
      required: true

  - type: input
    id: branch
    attributes:
      label: 작업 브랜치
      description: 규칙 `feature/<이름>-mission-<N>`
      placeholder: feature/sungsomin-mission-1
    validations:
      required: true

  - type: input
    id: deadline
    attributes:
      label: 목표 완료일
      placeholder: 2026-04-23
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: 추가 메모
      description: 구현 상 주의할 점, 의존성, 질문 등
    validations:
      required: false
